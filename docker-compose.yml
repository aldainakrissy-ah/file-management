services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: "file:/data/dev.db"
      JWT_SECRET: "change-me-in-production"
      PORT: "4000"
      CLIENT_ORIGIN: "http://localhost:5173"
    volumes:
      - server-data:/data

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "http://localhost:4000"
    ports:
      - "5173:80"
    depends_on:
      - server

volumes:
  server-data:
